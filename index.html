<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styless.css">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
</head>
<body>
    
    <section class="spacer"></section>


    <section class="poem-section" id="poem-section">
        <div class="poem-wrapper">
            <h1 class="poem-title">El primer beso</h1>
            <p>Amado Nervo</p>

            <!--Primer verso-->
            <div class="poem-line">
                <span class="poem-text">
                    Yo ya me despedia... y palpitante
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Segundo verso-->
            <div class="poem-line">
                <span class="poem-text">
                    cerca mi labio de tus labios rojos,
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Tercer verso-->
            <div class="poem-line">
                <span class="poem-text">
                    "hasta mañana", susurraste;
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Cuarto verso-->
            <div class="poem-line">
                <span class="poem-text">
                    yo te mire a los ojos un instante
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Quinto verso-->
            <div class="poem-line">
                <span class="poem-text">
                    y tu cerraste sin pensar los ojos
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Sexto verso-->
            <div class="poem-line">
                <span class="poem-text">
                    y te di el primer beso: alcé la frente  
                </span>
                <span class="poem-mask"></span>
            </div>

            <!--Septimo verso-->
            <div class="poem-line">
                <span class="poem-text">
                    iluminado por mi dicha cierta  
                </span>
                <span class="poem-mask"></span>
            </div>

        </div>
    </section>


   
    <section class="spacer"></section>
    <script src="script.js"></script>

</body>
</html>
